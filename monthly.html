<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>積立シミュレーター｜毎月投資の資産計算</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>積立シミュレーター</h1>
      <p class="subtitle">毎月の投資で将来資産を計算</p>

      <div class="card">
        <h2>シミュレーション</h2>

        <label>毎月の積立額（円）</label>
        <input id="monthly" type="number" placeholder="例：30000" />

        <label>年利（%）</label>
        <input id="rate" type="number" placeholder="例：5" />

        <label>年数</label>
        <input id="years" type="number" placeholder="例：20" />

        <button onclick="calc()">計算する</button>

        <div class="result" id="result"></div>
      </div>

      <!-- 解説 -->
      <div class="card">
        <h2>積立投資とは？</h2>
        <p>
          毎月一定額を投資することで、価格変動のリスクを分散しながら
          長期的に資産形成を目指す方法です。
        </p>
      </div>

      <p class="push-text">
        この結果を見た今が、資産運用を始めるベストタイミングです。
      </p>

      <!-- CTA -->
      <div class="card">
        <h2>投資を始める</h2>

        <p>シミュレーション結果をもとに資産形成を始めましょう</p>

        <p class="note-small">
          ※口座開設は無料・スマホで5分で完了
        </p>

        <a href="https://example.com" class="cta" target="_blank"> ▶ 無料で証券口座を開設する </a>
      </div>
    </div>

    <script>
      function calc() {
        let monthly = Number(document.getElementById("monthly").value);
        let rate = Number(document.getElementById("rate").value) / 100;
        let years = Number(document.getElementById("years").value);

        if (!monthly || !rate || !years) {
          alert("すべて入力してください");
          return;
        }

        let monthlyRate = rate / 12;
        let months = years * 12;

        let total;

        if (monthlyRate === 0) {
          total = monthly * months;
        } else {
          total =
            monthly * ((Math.pow(1 + monthlyRate, months) - 1) / monthlyRate);
        }

        let principal = monthly * months;
        let profit = total - principal;

        document.getElementById("result").innerHTML =
          "元本（総投資額）: <b>" +
          principal.toLocaleString() +
          " 円</b><br>" +
          "運用益: <b>" +
          Math.floor(profit).toLocaleString() +
          " 円</b><br><br>" +
          "将来の資産: <b>" +
          Math.floor(total).toLocaleString() +
          " 円</b>";
      }
    </script>
  </body>
</html>
