<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FIRE計算ツール｜早期リタイアに必要な資産</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>FIRE計算ツール</h1>
      <p class="subtitle">リタイアに必要な資産を計算</p>

      <div class="card">
        <h2>シミュレーション</h2>

        <label>年間支出（円）</label>
        <input id="annual" type="number" placeholder="例：3000000" />

        <label>想定利回り（%）</label>
        <input id="rate" type="number" placeholder="例：4" />

        <button onclick="calc()">計算する</button>

        <div class="result" id="result"></div>
      </div>

      <!-- 解説 -->
      <div class="card">
        <h2>FIREとは？</h2>
        <p>
          FIRE（Financial Independence, Retire Early）は、
          資産収入で生活できる状態を目指す考え方です。
        </p>
      </div>

      <!-- CTA -->
      <div class="card">
        <h2>投資を始める</h2>

        <p>シミュレーション結果をもとに資産形成を始めましょう</p>

        <p class="push-text">
          この金額を目標に、今から資産形成を始めることが重要です。
        </p>

        <p style="font-size: 12px; color: #888">
          ※口座開設は無料・スマホで5分で完了
        </p>

        <a href="#" class="cta" target="_blank"> ▶ 無料で証券口座を開設する </a>
      </div>
    </div>

    <script>
      function calc() {
        let annual = Number(document.getElementById("annual").value);
        let rate = Number(document.getElementById("rate").value) / 100;

        if (!annual || rate <= 0) {
          alert("すべて入力してください（利回りは0より大きくしてください）");
          return;
        }

        // 4%ルールベース
        let fireAmount = annual / rate;

        // 月生活費
        let monthly = annual / 12;

        document.getElementById("result").innerHTML =
          "月の生活費: <b>" +
          Math.floor(monthly).toLocaleString() +
          " 円</b><br>" +
          "年間支出: <b>" +
          annual.toLocaleString() +
          " 円</b><br><br>" +
          "必要資産: <b>" +
          Math.floor(fireAmount).toLocaleString() +
          " 円</b>";
      }
    </script>
  </body>
</html>
